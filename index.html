<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goat's Interactive GTAV Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: #111;
}

#map {
    width: 100vw;
    height: 100vh;
}

.hidden {
    display: none !important;
}

#branding {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
    backdrop-filter: blur(6px);
}

#loginForm {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 350px;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 25px;
    border-radius: 14px;
    z-index: 3000;
    text-align: center;
}

#loginForm input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 16px;
    border: none;
    border-radius: 8px;
}

#loginForm button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#loginError {
    color: #f87171;
    font-size: 14px;
    margin-top: -10px;
    margin-bottom: 10px;
    display: none;
}

.marker-controls {
    position: absolute;
    top: 70px;
    right: 10px;
    width: 250px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 14px;
    border-radius: 12px;
    z-index: 2000;
}

.marker-controls input,
.marker-controls select,
.marker-controls button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.marker-controls button {
    cursor: pointer;
    font-weight: bold;
}

#tutorialSidebar {
    position: absolute;
    top: 70px;
    left: 10px;
    width: 300px;
    max-width: calc(100vw - 20px);
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 16px;
    border-radius: 12px;
    z-index: 2000;
}

#tutorialSidebar h2 {
    margin-top: 0;
}

#closeTutorial {
    float: right;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
}

.leaflet-control-zoom {
    margin-bottom: 20px !important;
    margin-left: 10px !important;
}

@media (max-width: 768px) {
    .marker-controls {
        width: calc(100vw - 20px);
        top: auto;
        bottom: 10px;
        right: 10px;
        max-height: 45vh;
    }

    #tutorialSidebar {
        width: calc(100vw - 20px);
    }

    #branding {
        width: calc(100vw - 20px);
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div id="branding" class="hidden">
    Goat's Interactive GTAV Map
</div>

<div id="loginForm">
    <h2>Login</h2>
    <input type="email" id="username" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <div id="loginError">Invalid email or password.</div>
    <button onclick="login()">Login</button>
</div>

<div id="tutorialSidebar" class="hidden">
    <span id="closeTutorial" onclick="toggleTutorial()">×</span>
    <h2>Tutorial</h2>
    <ul>
        <li>Enter a marker name.</li>
        <li>Select a marker color.</li>
        <li>Press Prepare Marker.</li>
        <li>Click anywhere on the map.</li>
        <li>Markers save automatically.</li>
        <li>Use Refresh to sync devices.</li>
        <li>Click markers to remove them.</li>
    </ul>
</div>

<div class="marker-controls hidden" id="controls">
    <label>Marker Name</label>
    <input type="text" id="markerName" placeholder="Enter marker name" />

    <label>Marker Color</label>
    <select id="markerColor">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="orange">Orange</option>
        <option value="yellow">Yellow</option>
        <option value="violet">Violet</option>
    </select>

    <button onclick="prepareMarker()">Prepare Marker</button>
    <button onclick="refreshMarkers()">Refresh Markers</button>
    <button onclick="resetMarkers()">Reset Markers</button>
    <button onclick="toggleTutorial()">Show Tutorial</button>
</div>

<div id="map" class="hidden"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, push, set, get, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
    apiKey: 'AIzaSyAGqkZpU53S7QYsuDbIfBo08s9tCF8Iif4',
    authDomain: 'map-v2-6b2e4.firebaseapp.com',
    databaseURL: 'https://map-v2-6b2e4-default-rtdb.firebaseio.com',
    projectId: 'map-v2-6b2e4',
    storageBucket: 'map-v2-6b2e4.appspot.com',
    messagingSenderId: '216550808002',
    appId: '1:216550808002:web:3443680b0ebfebbae09e5b'
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

window.auth = auth;
window.database = database;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.ref = ref;
window.push = push;
window.set = set;
window.get = get;
window.remove = remove;

let currentUser = null;
let map;
let markers = [];
let placingMarker = false;

const markerIcons = {
    red:    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    blue:   'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
    green:  'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    orange: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
    yellow: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
    violet: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png'
};

window.login = async function() {
    const email = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        currentUser = userCredential.user;

        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('map').classList.remove('hidden');
        document.getElementById('branding').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');

        initializeMap();

    } catch(error) {
        errorEl.style.display = 'block';
        console.error(error);
    }
};

// Allow pressing Enter to log in
document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.login();
});

function initializeMap() {
    map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -5,
        zoomControl: false
    });

    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    // High-res GTA V map image
    const imageUrl = 'https://i.imgur.com/6pdBDOZ.jpeg';
    const bounds = [[0, 0], [1024, 1024]];

    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    loadMarkers();
}

window.prepareMarker = function() {
    const markerName = document.getElementById('markerName').value.trim();
    const markerColor = document.getElementById('markerColor').value;

    if (!markerName) {
        alert('Enter a marker name first');
        return;
    }

    if (placingMarker) return;
    placingMarker = true;

    // Visual feedback that we're waiting for a click
    document.getElementById('map').style.cursor = 'crosshair';

    map.once('click', async function(e) {
        placingMarker = false;
        document.getElementById('map').style.cursor = '';

        const markerData = {
            lat: e.latlng.lat,
            lng: e.latlng.lng,
            name: markerName,
            color: markerColor
        };

        const markersRef = ref(database, 'markers/' + currentUser.uid);
        const newMarkerRef = push(markersRef);
        await set(newMarkerRef, markerData);

        addMarker(markerData, newMarkerRef.key);

        // Clear the name field after placing
        document.getElementById('markerName').value = '';
    });
};

async function loadMarkers() {
    clearMapMarkers();

    const markersRef = ref(database, 'markers/' + currentUser.uid);
    const snapshot = await get(markersRef);

    if (!snapshot.exists()) return;

    const data = snapshot.val();
    Object.keys(data).forEach(key => {
        addMarker(data[key], key);
    });
}

function addMarker(markerData, firebaseKey) {
    const marker = L.marker([markerData.lat, markerData.lng], {
        icon: L.icon({
            iconUrl: markerIcons[markerData.color] || markerIcons.red,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        })
    }).addTo(map);

    marker.firebaseKey = firebaseKey;

    marker.bindPopup(`
        <b>${markerData.name}</b><br><br>
        <button onclick="deleteMarker('${firebaseKey}')">Remove Marker</button>
    `);

    markers.push(marker);
}

window.deleteMarker = async function(firebaseKey) {
    if (!firebaseKey) return;
    await remove(ref(database, 'markers/' + currentUser.uid + '/' + firebaseKey));
    await loadMarkers();
};

window.refreshMarkers = async function() {
    await loadMarkers();
};

window.resetMarkers = async function() {
    const confirmed = confirm('Delete ALL markers? This cannot be undone.');
    if (!confirmed) return;
    await remove(ref(database, 'markers/' + currentUser.uid));
    clearMapMarkers();
};

function clearMapMarkers() {
    markers.forEach(marker => map.removeLayer(marker));
    markers = [];
}

window.toggleTutorial = function() {
    document.getElementById('tutorialSidebar').classList.toggle('hidden');
};

</script>
</body>
</html>
